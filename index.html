<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Открытие кейса</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1e1e1e;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .slot-container {
            width: 300px;
            height: 200px;
            overflow: hidden;
            border: 3px solid #ffd700;
            border-radius: 12px;
            background: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #slot {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        #result-text {
            margin-top: 20px;
            font-size: 24px;
        }
        .btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="slot-container">
        <div id="slot">🎁</div>
    </div>
    <div id="result-text"></div>
    <button id="spin-btn" class="btn">ОТКРЫТЬ КЕЙС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // раскрыть на весь экран

        // Получаем переданные параметры (тип кейса, ID пользователя)
        const params = new URLSearchParams(tg.initDataUnsafe?.start_param || "");
        const caseIndex = params.get('caseIndex') || 0;
        const userId = tg.initDataUnsafe?.user?.id;

        // Скины, которые будем показывать в анимации (можно синхронизировать с ботом)
        const skins = [
            "🔹 P250 | Sand Dune",
            "🔹 MP7 | Forest DDPAT",
            "🔹 MAG-7 | Sand Dune",
            "🔸 AK-47 | Blue Laminate",
            "🔸 M4A4 | Griffin",
            "🔺 AWP | Electric Hive",
            "🔺 Desert Eagle | Conspiracy",
            "🔥 AK-47 | Vulcan",
            "👑 AWP | Dragon Lore",
            "👑 M4A4 | Howl"
        ];

        const spinBtn = document.getElementById('spin-btn');
        const slot = document.getElementById('slot');
        const resultText = document.getElementById('result-text');

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function spin() {
            if (!userId) {
                alert('Не удалось идентифицировать пользователя');
                return;
            }
            spinBtn.disabled = true;
            resultText.textContent = '';

            // Быстрая прокрутка названий
            let steps = 20;
            for (let i = 0; i < steps; i++) {
                const randomSkin = skins[Math.floor(Math.random() * skins.length)];
                slot.textContent = randomSkin;
                slot.style.transform = `translateY(${Math.sin(i * 0.5) * 5}px)`;
                await sleep(60);
            }

            // Фиксируем окончательный скин (сообщим боту, а бот выдаст реальный)
            // Пока просто отправим боту запрос через sendData
            const dataToSend = JSON.stringify({
                action: "open_case",
                userId: userId,
                caseIndex: caseIndex
            });

            // Показываем финальную анимацию (заглушка)
            slot.style.transform = 'translateY(0)';
            slot.textContent = '✨ Обработка...';

            tg.sendData(dataToSend);
        }

        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
