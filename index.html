<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS2 Case Opener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 15px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .case-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            backdrop-filter: blur(5px);
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .case-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .case-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .case-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .case-price {
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
        }

        .case-description {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Экран открытия */
        .opening-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow: hidden;
        }

        .opening-screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .roulette-container {
            width: 90%;
            height: 250px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .roulette-strip {
            display: flex;
            position: absolute;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .roulette-item {
            min-width: 160px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
        }

        .roulette-item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .roulette-item .item-name {
            font-size: 12px;
            text-align: center;
            font-weight: bold;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #ffd700, #ffaa00);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .pointer::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .result-screen.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .result-skin {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            animation: float 2s ease-in-out infinite;
        }

        .result-skin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .result-name {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-rarity {
            font-size: 18px;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
        }

        .btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: white;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
            z-index: 1001;
        }

        @keyframes sparkle {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .history-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .history-details {
            font-size: 12px;
            opacity: 0.7;
        }

        .history-rarity {
            font-weight: bold;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin: 20px 0;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab.active {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: black;
            border: none;
        }

        .warning-message {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div style="font-size: 14px; opacity: 0.7; margin-bottom: 5px;">ВАШ БАЛАНС</div>
            <div class="balance" id="balance">Загрузка...</div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('cases')">📦 Кейсы</div>
            <div class="tab" onclick="showTab('history')">📜 История</div>
        </div>

        <div id="cases-tab">
            <div class="cases-grid" id="casesList">
                <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                    <div class="loading"></div>
                    <p style="margin-top: 20px;">Загрузка кейсов...</p>
                </div>
            </div>
        </div>

        <div id="history-tab" style="display: none;">
            <div id="historyList"></div>
        </div>
    </div>

    <div class="opening-screen" id="openingScreen">
        <button class="close-btn" onclick="closeOpening()">✕</button>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>🎰 ОТКРЫТИЕ КЕЙСА</h2>
            <p id="openingCaseName" style="font-size: 18px; margin-top: 10px; opacity: 0.8;"></p>
        </div>

        <div class="roulette-container" id="roulette">
            <div class="pointer"></div>
            <div class="roulette-strip" id="rouletteStrip"></div>
        </div>

        <button class="btn" id="openButton" onclick="startOpening()">
            🎲 ОТКРЫТЬ ЗА <span id="openPrice">0</span> 💰
        </button>
    </div>

    <div class="result-screen" id="resultScreen">
        <h2>🎉 ВЫ ПОЛУЧИЛИ!</h2>
        <div class="result-skin" id="resultImage"></div>
        <div class="result-name" id="resultName"></div>
        <div class="result-rarity" id="resultRarity"></div>
        <div id="resultPrice" style="margin: 10px 0; font-size: 18px;"></div>
        
        <button class="btn" onclick="openAgain()">🔄 Открыть ещё</button>
        <button class="btn btn-secondary" onclick="closeResult()">🔙 К кейсам</button>
    </div>

    <div class="warning-message" id="warningMessage"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        
        // 🔧 ЗАМЕНИТЕ ЭТОТ АДРЕС НА ВАШ ИЗ xTunnel
        const API_URL = 'https://3bca674f-9245-48bb-ba8e-7f9093d0529e.tunnel4.com/api';
        
        let currentCase = null;
        let userData = null;
        let isOpening = false;

        tg.ready();
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id;
        
        if (!userId) {
            console.error('No user ID found');
            document.getElementById('balance').textContent = 'Ошибка авторизации';
        }

        async function fetchAPI(action, data = {}) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: action,
                        user_id: userId,
                        ...data
                    }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error(`API Error (${action}):`, error);
                throw error;
            }
        }

        async function loadUserData(retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const data = await fetchAPI('get_user');
                    if (data.success) {
                        userData = data.user;
                        updateBalance(userData.balance);
                        return true;
                    }
                } catch (error) {
                    console.log(`Attempt ${i + 1} failed:`, error);
                    if (i === retries - 1) {
                        document.getElementById('balance').textContent = 'Ошибка загрузки';
                    }
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
            return false;
        }

        async function loadCases() {
            try {
                const data = await fetchAPI('get_cases');
                if (data.success) {
                    displayCases(data.cases);
                } else {
                    throw new Error('Failed to load cases');
                }
            } catch (error) {
                console.error('Error loading cases:', error);
                const container = document.getElementById('casesList');
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                        <p>❌ Ошибка загрузки кейсов</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #ffd700; border: none; border-radius: 10px; cursor: pointer;">
                            🔄 Повторить
                        </button>
                    </div>
                `;
            }
        }

        function displayCases(cases) {
            const container = document.getElementById('casesList');
            container.innerHTML = cases.map(c => `
                <div class="case-card" onclick="selectCase(${c.id})">
                    <div class="case-image">
                        <img src="${c.image_url || 'https://via.placeholder.com/120'}" 
                             alt="${c.name}"
                             onerror="this.parentElement.innerHTML='📦'">
                    </div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-price">💰 ${c.price.toFixed(2)}</div>
                    ${c.description ? `<div class="case-description">${c.description}</div>` : ''}
                </div>
            `).join('');
        }

        async function selectCase(caseId) {
            if (isOpening) return;
            
            try {
                const data = await fetchAPI('get_case', { case_id: caseId });
                
                if (data.success) {
                    currentCase = data.case;
                    showOpeningScreen(data.case);
                }
            } catch (error) {
                console.error('Error selecting case:', error);
                showWarning('Ошибка загрузки кейса');
            }
        }

        function showOpeningScreen(caseData) {
            document.getElementById('openingCaseName').textContent = caseData.name;
            document.getElementById('openPrice').textContent = caseData.price.toFixed(2);
            
            const strip = document.getElementById('rouletteStrip');
            const skins = caseData.skins;
            let items = '';
            
            for (let i = 0; i < 20; i++) {
                skins.forEach(skin => {
                    const color = skin.color || '#ffffff';
                    items += `
                        <div class="roulette-item" style="border-color: ${color}">
                            <img src="${skin.image_url || 'https://via.placeholder.com/100'}" 
                                 alt="${skin.name}"
                                 onerror="this.parentElement.querySelector('img').style.display='none'">
                            <div class="item-name" style="color: ${color}">${skin.name}</div>
                        </div>
                    `;
                });
            }
            
            strip.innerHTML = items;
            strip.style.transform = 'translateX(0)';
            
            document.getElementById('openingScreen').classList.add('active');
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('openButton').style.display = 'block';
        }

        async function startOpening() {
            if (isOpening || !currentCase) return;
            
            if (userData.balance < currentCase.price) {
                showWarning('Недостаточно средств! Пополните баланс в боте.');
                return;
            }
            
            isOpening = true;
            document.getElementById('openButton').style.display = 'none';
            
            try {
                const data = await fetchAPI('open_case', { case_id: currentCase.id });
                
                if (data.success) {
                    updateBalance(data.new_balance);
                    userData.balance = data.new_balance;
                    animateRoulette(data.skin);
                } else {
                    showWarning(data.error);
                    isOpening = false;
                    document.getElementById('openButton').style.display = 'block';
                }
            } catch (error) {
                console.error('Error opening case:', error);
                showWarning('Произошла ошибка. Попробуйте еще раз.');
                isOpening = false;
                document.getElementById('openButton').style.display = 'block';
            }
        }

        function animateRoulette(winningSkin) {
            const strip = document.getElementById('rouletteStrip');
            const skins = currentCase.skins;
            
            const winIndex = skins.findIndex(s => s.id === winningSkin.id);
            const itemWidth = 160;
            
            const randomSets = Math.floor(Math.random() * 5) + 5;
            const targetPosition = -(randomSets * skins.length * itemWidth + winIndex * itemWidth);
            const offset = (Math.random() - 0.5) * (itemWidth * 0.6);
            const finalPosition = targetPosition + offset;
            
            strip.style.transition = 'transform 4s cubic-bezier(0.12, 0.8, 0.3, 1)';
            strip.style.transform = `translateX(${finalPosition}px)`;
            
            setTimeout(() => {
                showResult(winningSkin);
                createSparkles();
            }, 4200);
        }

        function showResult(skin) {
            document.getElementById('resultImage').innerHTML = `
                <img src="${skin.image_url || 'https://via.placeholder.com/200'}" 
                     alt="${skin.name}"
                     onerror="this.src='https://via.placeholder.com/200'">
            `;
            document.getElementById('resultName').textContent = skin.name;
            document.getElementById('resultRarity').textContent = skin.rarity;
            document.getElementById('resultRarity').style.backgroundColor = skin.color + '33';
            document.getElementById('resultRarity').style.color = skin.color;
            document.getElementById('resultRarity').style.border = `1px solid ${skin.color}`;
            document.getElementById('resultPrice').innerHTML = `💰 Стоимость: <b>${skin.price.toFixed(2)}</b>`;
            
            document.getElementById('resultScreen').classList.add('active');
            isOpening = false;
        }

        function createSparkles() {
            const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#ff9ff3', '#feca57'];
            const screen = document.getElementById('openingScreen');
            
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 100 + '%';
                    sparkle.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
                    sparkle.style.setProperty('--ty', (Math.random() - 0.5) * 400 + 'px');
                    sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
                    sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
                    sparkle.textContent = ['✦', '✧', '♦', '★', '✶'][Math.floor(Math.random() * 5)];
                    
                    screen.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 1000);
                }, i * 20);
            }
        }

        function closeOpening() {
            if (isOpening) return;
            document.getElementById('openingScreen').classList.remove('active');
            currentCase = null;
        }

        function closeResult() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('openingScreen').classList.remove('active');
            currentCase = null;
        }

        function openAgain() {
            document.getElementById('resultScreen').classList.remove('active');
            if (currentCase) {
                showOpeningScreen(currentCase);
            }
        }

        function updateBalance(amount) {
            document.getElementById('balance').textContent = `${amount.toFixed(2)} 💰`;
        }

        function showWarning(message) {
            const warning = document.getElementById('warningMessage');
            warning.textContent = message;
            warning.style.display = 'block';
            setTimeout(() => {
                warning.style.display = 'none';
            }, 3000);
        }

        async function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'cases') {
                document.getElementById('cases-tab').style.display = 'block';
                document.getElementById('history-tab').style.display = 'none';
            } else {
                document.getElementById('cases-tab').style.display = 'none';
                document.getElementById('history-tab').style.display = 'block';
                await loadHistory();
            }
        }

        async function loadHistory() {
            try {
                const data = await fetchAPI('get_history');
                
                if (data.success) {
                    const container = document.getElementById('historyList');
                    if (data.history.length === 0) {
                        container.innerHTML = '<div style="text-align: center; padding: 40px; opacity: 0.5;">История пуста</div>';
                    } else {
                        container.innerHTML = data.history.map(item => `
                            <div class="history-item">
                                <img src="${item.image_url || 'https://via.placeholder.com/50'}" 
                                     alt="${item.skin_name}"
                                     onerror="this.style.display='none'">
                                <div class="history-info">
                                    <div class="history-name" style="color: ${item.color || 'white'}">
                                        ${item.skin_name}
                                    </div>
                                    <div class="history-details">
                                        ${item.case_name} • ${new Date(item.time).toLocaleDateString()}
                                    </div>
                                </div>
                                <div>
                                    <div class="history-rarity" style="color: ${item.color || 'white'}">
                                        ${item.rarity}
                                    </div>
                                    <div style="font-size: 12px; opacity: 0.7; text-align: right;">
                                        💰 ${item.price.toFixed(2)}
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        async function initApp() {
            const userLoaded = await loadUserData();
            if (userLoaded) {
                await loadCases();
            }
        }

        window.addEventListener('load', () => {
            initApp();
        });
    </script>
</body>
</html>
