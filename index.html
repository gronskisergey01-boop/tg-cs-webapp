<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS2 Case Opener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 15px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .case-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .case-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .case-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .case-price {
            color: #ffd700;
            font-weight: bold;
        }

        /* Окно открытия кейса */
        .opening-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow: hidden;
        }

        .opening-screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .roulette-container {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .roulette-strip {
            display: flex;
            position: absolute;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .roulette-item {
            min-width: 150px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
        }

        .roulette-item .item-image {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .roulette-item .item-name {
            font-size: 12px;
            text-align: center;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #ffd700;
            z-index: 1;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .result-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .result-skin {
            font-size: 60px;
            margin: 20px 0;
            animation: pulse 1s infinite;
        }

        .result-name {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .result-rarity {
            font-size: 18px;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
        }

        .btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: white;
            background: none;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle 1s ease-out;
        }

        @keyframes sparkle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item .skin-image {
            font-size: 30px;
        }

        .tabs {
            display: flex;
            margin: 20px 0;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #ffd700;
            color: black;
        }

        .warning-message {
            background: rgba(255, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div style="font-size: 14px; opacity: 0.7;">ВАШ БАЛАНС</div>
            <div class="balance" id="balance">0 💰</div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('cases')">📦 Кейсы</div>
            <div class="tab" onclick="showTab('history')">📜 История</div>
        </div>

        <div id="cases-tab">
            <div class="cases-grid" id="casesList"></div>
        </div>

        <div id="history-tab" style="display: none;">
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Экран открытия кейса -->
    <div class="opening-screen" id="openingScreen">
        <button class="close-btn" onclick="closeOpening()">✕</button>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>🎰 ОТКРЫТИЕ КЕЙСА</h2>
            <p id="openingCaseName"></p>
        </div>

        <div class="roulette-container" id="roulette">
            <div class="pointer"></div>
            <div class="roulette-strip" id="rouletteStrip"></div>
        </div>

        <button class="btn" id="openButton" onclick="startOpening()">
            🎲 ОТКРЫТЬ ЗА <span id="openPrice">0</span> 💰
        </button>
    </div>

    <!-- Экран результата -->
    <div class="result-screen" id="resultScreen">
        <h2>🎉 ВЫ ПОЛУЧИЛИ!</h2>
        <div class="result-skin" id="resultImage"></div>
        <div class="result-name" id="resultName"></div>
        <div class="result-rarity" id="resultRarity"></div>
        <div id="resultPrice" style="margin: 10px 0; font-size: 18px;"></div>
        
        <button class="btn" onclick="openAgain()">🔄 Открыть ещё</button>
        <button class="btn btn-secondary" onclick="closeResult()">🔙 К кейсам</button>
    </div>

    <div class="warning-message" id="warningMessage"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = '/api';
        
        let currentCase = null;
        let userData = null;
        let isOpening = false;

        // Инициализация
        tg.ready();
        tg.expand();

        // Получаем user_id из Telegram WebApp
        const userId = tg.initDataUnsafe?.user?.id || 1;

        // Загрузка данных пользователя
        async function loadUserData() {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'get_user',
                    user_id: userId
                })
            });
            const data = await response.json();
            if (data.success) {
                userData = data.user;
                updateBalance(userData.balance);
            }
        }

        // Загрузка кейсов
        async function loadCases() {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'get_cases',
                    user_id: userId
                })
            });
            const data = await response.json();
            if (data.success) {
                displayCases(data.cases);
            }
        }

        // Отображение кейсов
        function displayCases(cases) {
            const container = document.getElementById('casesList');
            container.innerHTML = cases.map(c => `
                <div class="case-card" onclick="selectCase(${c.id})">
                    <div class="case-image">📦</div>
                    <div class="case-name">${c.name}</div>
                    <div class="case-price">💰 ${c.price.toFixed(2)}</div>
                </div>
            `).join('');
        }

        // Выбор кейса
        async function selectCase(caseId) {
            if (isOpening) return;
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'get_case',
                    user_id: userId,
                    case_id: caseId
                })
            });
            const data = await response.json();
            
            if (data.success) {
                currentCase = data.case;
                showOpeningScreen(data.case);
            }
        }

        // Показать экран открытия
        function showOpeningScreen(caseData) {
            document.getElementById('openingCaseName').textContent = caseData.name;
            document.getElementById('openPrice').textContent = caseData.price.toFixed(2);
            
            // Создаем рулетку
            const strip = document.getElementById('rouletteStrip');
            const skins = caseData.skins;
            let items = '';
            
            // Повторяем скины для длинной ленты
            for (let i = 0; i < 20; i++) {
                skins.forEach(skin => {
                    const color = skin.color || '#ffffff';
                    items += `
                        <div class="roulette-item" style="border-color: ${color}">
                            <div class="item-image">🎨</div>
                            <div class="item-name" style="color: ${color}">${skin.name}</div>
                        </div>
                    `;
                });
            }
            
            strip.innerHTML = items;
            strip.style.transform = 'translateX(0)';
            
            document.getElementById('openingScreen').classList.add('active');
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('openButton').style.display = 'block';
        }

        // Запуск открытия
        async function startOpening() {
            if (isOpening || !currentCase) return;
            
            // Проверяем баланс
            if (userData.balance < currentCase.price) {
                showWarning('Недостаточно средств!');
                return;
            }
            
            isOpening = true;
            document.getElementById('openButton').style.display = 'none';
            
            // Отправляем запрос на открытие
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'open_case',
                    user_id: userId,
                    case_id: currentCase.id
                })
            });
            const data = await response.json();
            
            if (data.success) {
                // Обновляем баланс
                updateBalance(data.new_balance);
                userData.balance = data.new_balance;
                
                // Запускаем анимацию
                animateRoulette(data.skin);
            } else {
                showWarning(data.error);
                isOpening = false;
                document.getElementById('openButton').style.display = 'block';
            }
        }

        // Анимация рулетки
        function animateRoulette(winningSkin) {
            const strip = document.getElementById('rouletteStrip');
            const skins = currentCase.skins;
            
            // Находим позицию выигрышного скина
            const winIndex = skins.findIndex(s => s.id === winningSkin.id);
            const itemWidth = 150;
            const totalWidth = skins.length * itemWidth * 10; // 10 повторений
            
            // Случайная позиция с выигрышным скином
            const randomSet = Math.floor(Math.random() * 5) + 5;
            const targetPosition = -(randomSet * skins.length * itemWidth + winIndex * itemWidth);
            
            // Добавляем случайное смещение для реалистичности
            const offset = (Math.random() - 0.5) * (itemWidth * 0.6);
            const finalPosition = targetPosition + offset;
            
            // Запускаем анимацию
            strip.style.transition = 'transform 4s cubic-bezier(0.12, 0.8, 0.3, 1)';
            strip.style.transform = `translateX(${finalPosition}px)`;
            
            // Показываем результат после анимации
            setTimeout(() => {
                showResult(winningSkin);
                createSparkles();
            }, 4200);
        }

        // Показать результат
        function showResult(skin) {
            document.getElementById('resultImage').textContent = '🎨';
            document.getElementById('resultName').textContent = skin.name;
            document.getElementById('resultRarity').textContent = skin.rarity;
            document.getElementById('resultRarity').style.backgroundColor = skin.color + '33';
            document.getElementById('resultRarity').style.color = skin.color;
            document.getElementById('resultPrice').textContent = `💰 ${skin.price.toFixed(2)}`;
            
            document.getElementById('resultScreen').classList.add('active');
            isOpening = false;
        }

        // Эффект конфетти
        function createSparkles() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = '50%';
                    sparkle.style.top = '50%';
                    sparkle.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
                    sparkle.style.setProperty('--ty', (Math.random() - 0.5) * 400 + 'px');
                    sparkle.style.color = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1'][Math.floor(Math.random() * 4)];
                    sparkle.textContent = '✦';
                    sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
                    
                    document.getElementById('openingScreen').appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 1000);
                }, i * 30);
            }
        }

        // Закрыть экран открытия
        function closeOpening() {
            if (isOpening) return;
            document.getElementById('openingScreen').classList.remove('active');
            currentCase = null;
        }

        // Закрыть результат
        function closeResult() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('openingScreen').classList.remove('active');
            currentCase = null;
        }

        // Открыть снова
        function openAgain() {
            document.getElementById('resultScreen').classList.remove('active');
            if (currentCase) {
                showOpeningScreen(currentCase);
            }
        }

        // Обновление баланса
        function updateBalance(amount) {
            document.getElementById('balance').textContent = `${amount.toFixed(2)} 💰`;
        }

        // Показать предупреждение
        function showWarning(message) {
            const warning = document.getElementById('warningMessage');
            warning.textContent = message;
            warning.style.display = 'block';
            setTimeout(() => {
                warning.style.display = 'none';
            }, 3000);
        }

        // Переключение вкладок
        async function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'cases') {
                document.getElementById('cases-tab').style.display = 'block';
                document.getElementById('history-tab').style.display = 'none';
            } else {
                document.getElementById('cases-tab').style.display = 'none';
                document.getElementById('history-tab').style.display = 'block';
                await loadHistory();
            }
        }

        // Загрузка истории
        async function loadHistory() {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    action: 'get_history',
                    user_id: userId
                })
            });
            const data = await response.json();
            
            if (data.success) {
                const container = document.getElementById('historyList');
                container.innerHTML = data.history.map(item => `
                    <div class="history-item">
                        <div class="skin-image">🎨</div>
                        <div>
                            <div style="color: ${item.color || 'white'}">${item.skin_name}</div>
                            <div style="font-size: 12px; opacity: 0.7;">
                                ${item.case_name} • ${new Date(item.time).toLocaleDateString()}
                            </div>
                        </div>
                        <div style="margin-left: auto; color: ${item.color || 'white'}">
                            ${item.rarity}
                        </div>
                    </div>
                `).join('');
            }
        }

        // Инициализация приложения
        async function initApp() {
            await loadUserData();
            await loadCases();
        }

        // Запуск
        initApp();
    </script>
</body>
</html>
